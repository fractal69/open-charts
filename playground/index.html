<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Charts Playground</title>

    <link rel="stylesheet" href="./chart.css" />

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;

        background: #000;
        color: #fff;
        font-family: system-ui, sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .chart-container {
        display: flex;
        flex-direction: column;

        width: 100%;
        height: 100%;
        
        box-sizing: border-box;

        gap: 0.5rem;

        overflow-y: auto;
        overflow-x: hidden;
      }

      .chart-container::-webkit-scrollbar {
        width: 1rem;
      }

      .chart-container::-webkit-scrollbar-track {
        background: transparent;
      }

      .chart-container::-webkit-scrollbar-thumb {
        background: transparent;
        border-radius: 2px;
        transition: background 0.2s;
      }

      .chart-container::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.35);
      }

      .chart-area {
        min-height: 600px;
      }

      .indicator-pane {
        min-height: 300px;
        flex-shrink: 0;
        border-top: 1px solid #333;
        background: rgba(255, 255, 255, 0.15);
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div class="chart-container">
        <div id="chart-area" class="chart-area"></div>

        <div id="pane-1" class="chart-area indicator-pane"></div>
        <div id="pane-2" class="chart-area indicator-pane"></div>
        <div id="pane-3" class="indicator-pane"></div>
        <div id="pane-4" class="indicator-pane"></div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
